<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ClimApp | Registro de usuario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>

<body>

    <main class="auth-container">

        <section class="auth-card">

            <a href="{{ url_for('view.index') }}" class="back-link">← Volver al inicio</a>

            <h1>Registro de usuario</h1>
            <p class="subtitle">Crea tu cuenta para acceder a ClimApp</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flashes">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form id="registroForm" action="{{ url_for('view.registro_usuario') }}" method="POST">

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="ejemplo@email.com" 
                        required
                    >
                    <small id="emailError"></small>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Mínimo 6 caracteres" 
                        required
                    >
                    <small id="passwordError"></small>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Repetir contraseña</label>
                    <input 
                        type="password" 
                        id="confirm_password" 
                        name="confirm_password" 
                        placeholder="Repite tu contraseña" 
                        required
                    >
                    <small id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="primary-btn">Crear cuenta</button>

                <p class="bottom-text">
                    ¿Ya tienes cuenta?
                    <a href="{{ url_for('view.login') }}">Inicia sesión</a>
                </p>

            </form>

        </section>

    </main>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
