<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClimApp Analytics - Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #fff; }
    
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px 30px;
      border-bottom: 1px solid #333;
    }
    .header h1 { font-size: 1.5rem; font-weight: 600; }
    .header span { color: #4ade80; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px 30px;
    }
    
    .stat-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #333;
    }
    .stat-card .label { color: #888; font-size: 0.875rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #4ade80; }
    .stat-card .sub { color: #666; font-size: 0.75rem; }
    
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      padding: 0 30px 30px;
    }
    
    .chart-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #333;
    }
    .chart-card h3 { margin-bottom: 15px; color: #ccc; font-size: 0.9rem; }
    
    .city-select {
      background: #1a1a2e;
      border: 1px solid #333;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ClimApp <span>Analytics</span></h1>
  </div>
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Requests Totales</div>
      <div class="value" id="totalRequests">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Temperatura Promedio</div>
      <div class="value" id="avgTemp">-</div>
      <div class="sub">Últimas 24h</div>
    </div>
    <div class="stat-card">
      <div class="label">Humedad Promedio</div>
      <div class="value" id="avgHum">-</div>
      <div class="sub">Últimas 24h</div>
    </div>
    <div class="stat-card">
      <div class="label">Ciudades Consultadas</div>
      <div class="value" id="cityCount">-</div>
    </div>
  </div>
  
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Temperatura - Tiempo Real</h3>
      <canvas id="tempChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Humedad - Tiempo Real</h3>
      <canvas id="humChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Distribución de Ciudades</h3>
      <canvas id="cityChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Alertas Activas</h3>
      <canvas id="alertChart"></canvas>
    </div>
  </div>

  <script>
    const API_BASE = '';
    
    // Cargar stats
    async function loadStats() {
      try {
        const resp = await fetch(API_BASE + '/api/stats');
        const data = await resp.json();
        
        document.getElementById('totalRequests').textContent = data.metricas_api?.requests_total || 0;
        document.getElementById('avgTemp').textContent = (data.datos_hoy?.temp_promedio || 0) + '°';
        document.getElementById('avgHum').textContent = (data.datos_hoy?.humedad_promedio || 0) + '%';
        document.getElementById('cityCount').textContent = data.datos_hoy?.registros || 0;
      } catch(e) {
        console.error('Error cargando stats:', e);
      }
    }
    
    // Gráfico de temperatura
    let tempChart, humChart, cityChart, alertChart;
    
    function initCharts() {
      const chartOptions = {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#333' }, ticks: { color: '#888' } },
          y: { grid: { color: '#333' }, ticks: { color: '#888' } }
        }
      };
      
      tempChart = new Chart(document.getElementById('tempChart'), {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Temperatura',
            data: [],
            borderColor: '#4ade80',
            backgroundColor: 'rgba(74, 222, 128, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: chartOptions
      });
      
      humChart = new Chart(document.getElementById('humChart'), {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: 'Humedad',
            data: [],
            borderColor: '#60a5fa',
            backgroundColor: 'rgba(96, 165, 250, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: chartOptions
      });
      
      cityChart = new Chart(document.getElementById('cityChart'), {
        type: 'doughnut',
        data: {
          labels: ['Madrid', 'Barcelona', 'Valencia', 'Otros'],
          datasets: [{
            data: [40, 25, 20, 15],
            backgroundColor: ['#4ade80', '#60a5fa', '#f472b6', '#888']
          }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#ccc' } } } }
      });
      
      alertChart = new Chart(document.getElementById('alertChart'), {
        type: 'bar',
        data: {
          labels: ['Normales', 'Medio', 'Alto', 'Extremo'],
          datasets: [{
            data: [75, 15, 8, 2],
            backgroundColor: ['#4ade80', '#eab308', '#f97316', '#dc2626']
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#333' }, ticks: { color: '#888' } },
            y: { grid: { color: '#333' }, ticks: { color: '#888' } }
          }
        }
      });
    }
    
    // Actualizar datos en tiempo real
    async function updateCharts() {
      // Simular datos en tiempo real
      const now = new Date();
      const timeLabel = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      
      const temp = 15 + Math.random() * 15;
      const hum = 40 + Math.random() * 40;
      
      tempChart.data.labels.push(timeLabel);
      tempChart.data.datasets[0].data.push(temp);
      if(tempChart.data.labels.length > 20) {
        tempChart.data.labels.shift();
        tempChart.data.datasets[0].data.shift();
      }
      tempChart.update();
      
      humChart.data.labels.push(timeLabel);
      humChart.data.datasets[0].data.push(hum);
      if(humChart.data.labels.length > 20) {
        humChart.data.labels.shift();
        humChart.data.datasets[0].data.shift();
      }
      humChart.update();
    }
    
    // Iniciar
    async function init() {
      initCharts();
      await loadStats();
      
      // Actualizar cada 30 segundos
      setInterval(loadStats, 30000);
      setInterval(updateCharts, 5000);
    }
    
    init();
  </script>
</body>
</html>
